# TMC Studio - Netlify Configuration
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # Base directory (root of monorepo)
  base = "/"
  
  # Build command - force install devDependencies for build tools
  command = "corepack enable && pnpm install --prod=false && pnpm run build"
  
  # Output directory (Vite build output)
  publish = "apps/web/dist"
  
  # Functions directory
  functions = "netlify/functions"

[build.environment]
  # Node version
  NODE_VERSION = "20"
  
  # pnpm version
  PNPM_VERSION = "9"
  
  # Install all dependencies (including devDependencies for build tools)
  NPM_FLAGS = "--include=dev"

# Development settings
[dev]
  # Port for local development
  port = 8888
  
  # Target port (your Vite app)
  targetPort = 3000
  
  # Auto-launch browser
  autoLaunch = false
  
  # Functions port
  functionsPort = 9999
  
  # Framework detection
  framework = "#custom"
  
  # Command to start dev server
  command = "pnpm --filter @tmc/web dev"

# Functions configuration
[functions]
  # Node.js bundler (esbuild for TypeScript)
  node_bundler = "esbuild"

# API routes to functions (MUST be first!)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback - serve index.html for all non-file routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://*.supabase.co; connect-src 'self' https://*.supabase.co https://auth.tmcstudio.app https://*.stripe.com https://checkout.stripe.com https://api.stripe.com https://accounts.google.com https://api.github.com https://plausible.io; frame-src https://checkout.stripe.com https://accounts.google.com; font-src 'self' data: https://fonts.gstatic.com; base-uri 'self'; form-action 'self';"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/.well-known/security.txt"
  [headers.values]
    Content-Type = "text/plain"
    Cache-Control = "public, max-age=86400"

# Context-specific settings
[context.production]
  environment = { NODE_ENV = "production" }

[context.deploy-preview]
  environment = { NODE_ENV = "development" }

[context.branch-deploy]
  environment = { NODE_ENV = "development" }
