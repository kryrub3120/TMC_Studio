name: Desktop Release

# Builds the Tauri desktop apps for macOS (universal) and Windows and
# attaches the installers to a GitHub Release.
#
# Trigger: push a tag like `v0.6.0`, or run manually from the Actions tab.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   VITE_SUPABASE_URL
#   VITE_SUPABASE_ANON_KEY
# Optional (code signing — add later):
#   macOS:   APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY,
#            APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID
#   Windows: WINDOWS_CERTIFICATE, WINDOWS_CERTIFICATE_PASSWORD

env:
  # Node.js 24 migration — GitHub Actions runners will use Node 24 by default
  # from June 16, 2026. This opt-in avoids deprecation warnings.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag, e.g. v0.6.0'
        required: true
        default: 'v0.6.0'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            rust-targets: ''
            args: ''

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9.15.0'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './apps/web/src-tauri -> target'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # Updater signing — required so tauri-action generates a signed latest.json
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/web
          tagName: ${{ github.event.inputs.version || github.ref_name }}
          releaseName: 'TMC Studio ${{ github.event.inputs.version || github.ref_name }}'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
